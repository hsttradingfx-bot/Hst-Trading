name: Signal SOL Bot

# Ce workflow lance les deux bots de detection de signal toutes les 15 minutes,
# puis sauvegarde (commit) les fichiers du journal pour que l'etat persiste.

on:
  schedule:
    - cron: "*/15 * * * *"  # toutes les 15 minutes
  workflow_dispatch: {}     # permet aussi de lancer manuellement depuis GitHub

# Permissions necessaires pour que le workflow puisse committer les fichiers d'etat
permissions:
  contents: write

# Empeche deux executions de tourner en meme temps (evite les conflits de commit)
concurrency:
  group: signal-bot
  cancel-in-progress: false

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verifier le signal (bot 1 + bot 2)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python live_bot_mexc.py
          python bot2.py

      - name: Sauvegarder le journal et l'etat (Commit & Push)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # On ajoute TOUS les fichiers d'etat et de journal s'ils existent
          git add open_trades.json trades_journal.csv seen_keys.json signaled_state.json || true
          
          # Verifie s'il y a des changements avant de commit pour eviter une erreur inutile
          if ! git diff --cached --quiet; then
            git commit -m "Mise a jour automatique du journal et des etats [skip ci]"
            git push
          else
            echo "Aucun changement d'etat, rien a committer."
          fi
          
